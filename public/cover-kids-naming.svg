<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Four circles representing 4 sciences -->
  <!-- Numerology -->
  <circle cx="200" cy="150" r="80" fill="none" stroke="#fbbf24" stroke-width="3" opacity="0.6"/>
  <text x="200" y="140" font-size="24" font-weight="bold" text-anchor="middle" fill="#fbbf24">123</text>
  <text x="200" y="170" font-size="16" text-anchor="middle" fill="#f3e8ff">เลขศาสตร์</text>
  
  <!-- Thaksa -->
  <circle cx="400" cy="150" r="80" fill="none" stroke="#34d399" stroke-width="3" opacity="0.6"/>
  <text x="400" y="130" font-size="32" font-weight="bold" text-anchor="middle" fill="#34d399">ข</text>
  <text x="400" y="170" font-size="16" text-anchor="middle" fill="#f3e8ff">ทักษา</text>
  
  <!-- Ayatana 6 -->
  <circle cx="600" cy="150" r="80" fill="none" stroke="#a78bfa" stroke-width="3" opacity="0.6"/>
  <text x="600" y="145" font-size="28" font-weight="bold" text-anchor="middle" fill="#a78bfa">6️⃣</text>
  <text x="600" y="180" font-size="16" text-anchor="middle" fill="#f3e8ff">อายตนะ 6</text>
  
  <!-- Nirun -->
  <circle cx="800" cy="150" r="80" fill="none" stroke="#f87171" stroke-width="3" opacity="0.6"/>
  <text x="800" y="135" font-size="28" font-weight="bold" text-anchor="middle" fill="#f87171">✨</text>
  <text x="800" y="175" font-size="16" text-anchor="middle" fill="#f3e8ff">นิรันดร์</text>
  
  <!-- Main title -->
  <text x="600" y="320" font-size="56" font-weight="bold" text-anchor="middle" fill="#fbbf24">
    คู่มือตั้งชื่อลูก 2569
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="390" font-size="28" text-anchor="middle" fill="#e0e7ff">
    50+ ชื่อมงคลเกรด A+ ครบ 4 ศาสตร์
  </text>
  
  <!-- Decorative elements -->
  <line x1="100" y1="450" x2="1100" y2="450" stroke="#fbbf24" stroke-width="2" opacity="0.3"/>
  
  <!-- Bottom tagline -->
  <text x="600" y="510" font-size="20" text-anchor="middle" fill="#cbd5e1">
    ปักหมุดชะตา • เปิดโอกาส • ดึงดูดสำเร็จ
  </text>
  
  <!-- NameMongkol branding -->
  <text x="600" y="570" font-size="18" text-anchor="middle" fill="#94a3b8" font-style="italic">
    ✓ NameMongkol — ตั้งชื่อสมมาตะฟรี
  </text>
</svg>