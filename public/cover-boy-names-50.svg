<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGradient3)"/>
  
  <!-- Grade A+ badge -->
  <circle cx="150" cy="100" r="50" fill="#10b981" opacity="0.8"/>
  <text x="150" y="95" font-size="28" font-weight="bold" text-anchor="middle" fill="white">A+</text>
  <text x="150" y="125" font-size="12" text-anchor="middle" fill="white" font-weight="bold">เกรดดี</text>
  
  <!-- Boys names samples -->
  <!-- Name 1 -->
  <rect x="250" y="80" width="180" height="100" rx="10" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="2"/>
  <text x="340" y="120" font-size="24" font-weight="bold" text-anchor="middle" fill="#60a5fa">ศิริ</text>
  <text x="340" y="150" font-size="14" text-anchor="middle" fill="#cbd5e1">ผลรวม: 14</text>
  <text x="340" y="170" font-size="12" text-anchor="middle" fill="#94a3b8">เมตตามหา</text>
  
  <!-- Name 2 -->
  <rect x="480" y="80" width="180" height="100" rx="10" fill="#8b5cf6" opacity="0.1" stroke="#8b5cf6" stroke-width="2"/>
  <text x="570" y="120" font-size="24" font-weight="bold" text-anchor="middle" fill="#a78bfa">ปิยะ</text>
  <text x="570" y="150" font-size="14" text-anchor="middle" fill="#cbd5e1">ผลรวม: 24</text>
  <text x="570" y="170" font-size="12" text-anchor="middle" fill="#94a3b8">เมตตา+ทรัพย์</text>
  
  <!-- Name 3 -->
  <rect x="710" y="80" width="180" height="100" rx="10" fill="#ec4899" opacity="0.1" stroke="#ec4899" stroke-width="2"/>
  <text x="800" y="120" font-size="24" font-weight="bold" text-anchor="middle" fill="#f472b6">ประสิทธิ์</text>
  <text x="800" y="150" font-size="14" text-anchor="middle" fill="#cbd5e1">ผลรวม: 36</text>
  <text x="800" y="170" font-size="12" text-anchor="middle" fill="#94a3b8">บารมี</text>
  
  <!-- Main title -->
  <text x="600" y="310" font-size="56" font-weight="bold" text-anchor="middle" fill="#60a5fa">
    ชื่อลูกชาย 2569
  </text>
  <text x="600" y="365" font-size="28" text-anchor="middle" fill="#fbbf24">
    50 ชื่อมงคลเกรด A+
  </text>
  
  <!-- Decorative line -->
  <line x1="250" y1="420" x2="950" y2="420" stroke="#fbbf24" stroke-width="2" opacity="0.3"/>
  
  <!-- Features list -->
  <text x="320" y="480" font-size="18" text-anchor="start" fill="#e0e7ff">
    ✓ 50 ชื่อคัดเลือก
  </text>
  <text x="600" y="480" font-size="18" text-anchor="start" fill="#e0e7ff">
    ✓ 4 ศาสตร์
  </text>
  <text x="880" y="480" font-size="18" text-anchor="start" fill="#e0e7ff">
    ✓ ผลรวมดี
  </text>
  
  <!-- Footer -->
  <text x="600" y="560" font-size="16" text-anchor="middle" fill="#94a3b8" font-style="italic">
    คัดด้วย เลขศาสตร์ • ทักษา • อายตนะ 6 • นิรันดร์ศาสตร์
  </text>
