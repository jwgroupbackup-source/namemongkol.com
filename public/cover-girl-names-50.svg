<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGradient4)"/>
  
  <!-- Grade A+ badge with feminine touch -->
  <circle cx="150" cy="100" r="50" fill="#ec4899" opacity="0.8"/>
  <text x="150" y="95" font-size="28" font-weight="bold" text-anchor="middle" fill="white">A+</text>
  <text x="150" y="125" font-size="12" text-anchor="middle" fill="white" font-weight="bold">สวยงาม</text>
  
  <!-- Girls names samples -->
  <!-- Name 1 -->
  <rect x="250" y="80" width="180" height="100" rx="10" fill="#f472b6" opacity="0.1" stroke="#f472b6" stroke-width="2"/>
  <text x="340" y="120" font-size="24" font-weight="bold" text-anchor="middle" fill="#f472b6">สิรีย์</text>
  <text x="340" y="150" font-size="14" text-anchor="middle" fill="#cbd5e1">ผลรวม: 15</text>
  <text x="340" y="170" font-size="12" text-anchor="middle" fill="#94a3b8">ขุมทรัพย์</text>
  
  <!-- Name 2 -->
  <rect x="480" y="80" width="180" height="100" rx="10" fill="#a78bfa" opacity="0.1" stroke="#a78bfa" stroke-width="2"/>
  <text x="570" y="120" font-size="24" font-weight="bold" text-anchor="middle" fill="#a78bfa">ชนิกา</text>
  <text x="570" y="150" font-size="14" text-anchor="middle" fill="#cbd5e1">ผลรวม: 24</text>
  <text x="570" y="170" font-size="12" text-anchor="middle" fill="#94a3b8">เมตตา+ทรัพย์</text>
  
  <!-- Name 3 -->
  <rect x="710" y="80" width="180" height="100" rx="10" fill="#06b6d4" opacity="0.1" stroke="#06b6d4" stroke-width="2"/>
  <text x="800" y="120" font-size="24" font-weight="bold" text-anchor="middle" fill="#06b6d4">ธนิกา</text>
  <text x="800" y="150" font-size="14" text-anchor="middle" fill="#cbd5e1">ผลรวม: 36</text>
  <text x="800" y="170" font-size="12" text-anchor="middle" fill="#94a3b8">บารมี</text>
  
  <!-- Main title -->
  <text x="600" y="310" font-size="56" font-weight="bold" text-anchor="middle" fill="#f472b6">
    ชื่อลูกสาว 2569
  </text>
  <text x="600" y="365" font-size="28" text-anchor="middle" fill="#fbbf24">
    50 ชื่อมงคลเกรด A+ สวยงาม
  </text>
  
  <!-- Decorative line -->
  <line x1="250" y1="420" x2="950" y2="420" stroke="#fbbf24" stroke-width="2" opacity="0.3"/>
  
  <!-- Features list -->
  <text x="280" y="480" font-size="18" text-anchor="start" fill="#e0e7ff">
    ✓ 50 ชื่อสวยงาม
  </text>
  <text x="600" y="480" font-size="18" text-anchor="start" fill="#e0e7ff">
    ✓ 4 ศาสตร์
  </text>
  <text x="870" y="480" font-size="18" text-anchor="start" fill="#e0e7ff">
    ✓ เสริมดวง
  </text>
  
  <!-- Footer -->
  <text x="600" y="560" font-size="16" text-anchor="middle" fill="#94a3b8" font-style="italic">
    คัดด้วย เลขศาสตร์ • ทักษา • อายตนะ 6 • นิรันดร์ศาสตร์
  </text>
</svg>