<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGradient5)"/>
  
  <!-- 7 Days of week - circular arrangement -->
  <!-- Monday -->
  <circle cx="150" cy="150" r="45" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <text x="150" y="155" font-size="28" text-anchor="middle" fill="#fbbf24" font-weight="bold">จ</text>
  
  <!-- Tuesday -->
  <circle cx="300" cy="100" r="45" fill="none" stroke="#34d399" stroke-width="2"/>
  <text x="300" y="105" font-size="28" text-anchor="middle" fill="#34d399" font-weight="bold">อ</text>
  
  <!-- Wednesday -->
  <circle cx="400" cy="50" r="45" fill="none" stroke="#a78bfa" stroke-width="2"/>
  <text x="400" y="55" font-size="28" text-anchor="middle" fill="#a78bfa" font-weight="bold">พ</text>
  
  <!-- Thursday -->
  <circle cx="550" cy="50" r="45" fill="none" stroke="#f87171" stroke-width="2"/>
  <text x="550" y="55" font-size="28" text-anchor="middle" fill="#f87171" font-weight="bold">พ</text>
  
  <!-- Friday -->
  <circle cx="700" cy="100" r="45" fill="none" stroke="#06b6d4" stroke-width="2"/>
  <text x="700" y="105" font-size="28" text-anchor="middle" fill="#06b6d4" font-weight="bold">ศ</text>
  
  <!-- Saturday -->
  <circle cx="850" cy="150" r="45" fill="none" stroke="#ec4899" stroke-width="2"/>
  <text x="850" y="155" font-size="28" text-anchor="middle" fill="#ec4899" font-weight="bold">ส</text>
  
  <!-- Sunday -->
  <circle cx="1000" cy="150" r="45" fill="none" stroke="#60a5fa" stroke-width="2"/>
  <text x="1000" y="155" font-size="28" text-anchor="middle" fill="#60a5fa" font-weight="bold">อ</text>
  
  <!-- Connecting lines -->
  <path d="M 150 150 L 300 100 L 400 50 L 550 50 L 700 100 L 850 150 L 1000 150" 
        stroke="#94a3b8" stroke-width="1" fill="none" opacity="0.3"/>
  
  <!-- Main title -->
  <text x="600" y="300" font-size="52" font-weight="bold" text-anchor="middle" fill="#fbbf24">
    ทักษา-ปกรณ์
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="360" font-size="28" text-anchor="middle" fill="#e0e7ff">
    ศาสตร์การตั้งชื่อตามวันเกิด
  </text>
  
  <!-- Key concept -->
  <rect x="300" y="420" width="600" height="80" rx="15" fill="#10b981" opacity="0.1" stroke="#34d399" stroke-width="2"/>
  <text x="600" y="450" font-size="20" text-anchor="middle" fill="#34d399" font-weight="bold">
    หลีกเลี่ยงอักษรกาลกิณี
  </text>
  <text x="600" y="480" font-size="16" text-anchor="middle" fill="#cbd5e1">
    เลือกอักษรมงคล ตามวันเกิด ของลูก
  </text>
  
  <!-- Footer -->
  <text x="600" y="570" font-size="16" text-anchor="middle" fill="#94a3b8">
    ✓ 7 วัน • 7 ตารางอักษร • เทคนิกการหลีกเลี่ยง
  </text>
</svg>